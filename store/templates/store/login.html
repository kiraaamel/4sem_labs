{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}

<h1>Вход в аккаунт</h1>

<form method="post">
    {% csrf_token %}
    
    {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div class="error" style="color: #c0392b; font-size: 14px; margin-top: 5px;">
                    {{ field.errors|striptags }}
                </div>
            {% endif %}
        </div>
    {% endfor %}
    
    <button type="submit">Войти</button>
</form>

<p style="margin-top: 20px; text-align: center;">
    Нет аккаунта? <a href="{% url 'store:register' %}" style="color: #c9a96e;">Зарегистрироваться</a>
</p>

{% endblock %}
